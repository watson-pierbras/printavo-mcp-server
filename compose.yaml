version: "3.8"

services:
  printavo-mcp:
    build: .
    container_name: printavo-mcp-server
    ports:
      - "3000:3000"
    environment:
      - PRINTAVO_EMAIL=${PRINTAVO_EMAIL}
      - PRINTAVO_API_TOKEN=${PRINTAVO_API_TOKEN}
      - MCP_API_KEY=${MCP_API_KEY}
      - PORT=3000
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
